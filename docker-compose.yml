services:
  amex-sync:
    build: .
    container_name: amex-actual-importer
    restart: unless-stopped
    env_file: .env
    # Share Docker network with actual-server so
    # ACTUAL_SERVER_URL=http://actual-server:5006 works
    networks:
      - actual-net
    depends_on:
      - actual-server

  # If you already run actual-server separately, remove this block
  # and just attach amex-sync to your existing network.
  actual-server:
    image: actualbudget/actual-server:latest
    container_name: actual-server
    restart: unless-stopped
    ports:
      - "5006:5006"
    volumes:
      - actual-data:/data
    networks:
      - actual-net

volumes:
  actual-data:

networks:
  actual-net:
    driver: bridge
